name: Publish npm package

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Trusted Publishing (OIDC) と provenance 署名に必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Update npm
        # Trusted Publishing は npm 11.5.1 以降が必要
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Verify package.json version matches git tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::package.json version ($PKG_VERSION) does not match git tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Publish to npm
        # Trusted Publisher 設定 (npmjs.com の package settings) からの OIDC で認証されるため、
        # NPM_TOKEN 等のシークレットは不要。provenance も自動で付与される。
        run: npm publish
